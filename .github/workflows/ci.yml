name: KubeRescue CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-test-security:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run Black (format check)
        run: black --check .

      - name: Run Ruff
        run: ruff check .

      - name: Run Flake8
        run: flake8 .

      - name: Run Bandit (security scan)
        run: bandit -r kubrescue

      - name: Run MyPy (type checking)
        run: mypy kubrescue
      - name: Run Pytest
        run: pytest -v
